[mongodb]
# Source MongoDB connection URI
source_uri = mongodb://localhost:27017

# Destination MongoDB connection URI
dest_uri = mongodb://localhost:27018

# Optional: Authentication details if not in URI
# source_username =
# source_password =
# dest_username =
# dest_password =

[options]
# Default batch size for copying documents
batch_size = 1000

# Timeout for operations (seconds)
timeout = 300

# Whether to drop existing collections before copying
drop_existing = false

# Whether to copy indexes
copy_indexes = true