# Example configuration for different environments

# === LOCAL TO LOCAL ===
[mongodb]
source_uri = mongodb://localhost:27017
dest_uri = mongodb://localhost:27018

[options]
batch_size = 1000
timeout = 300
drop_existing = false
copy_indexes = true

# === LOCAL TO REMOTE ===
# [mongodb]
# source_uri = mongodb://localhost:27017
# dest_uri = mongodb://user:password@remote-host:27017/dbname?authSource=admin

# [options]
# batch_size = 500
# timeout = 600
# drop_existing = false
# copy_indexes = true

# === AUTHENTICATED CONNECTIONS ===
# [mongodb]
# source_uri = mongodb://sourceuser:sourcepass@source-host:27017/sourcedb?authSource=admin&ssl=true
# dest_uri = mongodb://destuser:destpass@dest-host:27017/destdb?authSource=admin&ssl=true

# [options]
# batch_size = 100
# timeout = 900
# drop_existing = true
# copy_indexes = true

# === REPLICA SET CONNECTIONS ===
# [mongodb]
# source_uri = mongodb://user:pass@host1:27017,host2:27017,host3:27017/mydb?replicaSet=myReplSet&authSource=admin
# dest_uri = mongodb://user:pass@host4:27017,host5:27017,host6:27017/mydb?replicaSet=destReplSet&authSource=admin

# [options]
# batch_size = 2000
# timeout = 1200
# drop_existing = false
# copy_indexes = true

# === ATLAS/CLOUD CONNECTIONS ===
# [mongodb]
# source_uri = mongodb+srv://username:password@cluster0.abc123.mongodb.net/mydb?retryWrites=true&w=majority
# dest_uri = mongodb+srv://username:password@cluster1.def456.mongodb.net/mydb?retryWrites=true&w=majority

# [options]
# batch_size = 500
# timeout = 1800
# drop_existing = false
# copy_indexes = true